<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gldani — Name Name</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .slide { display: none; }
        .slide.active { display: block; }
        .nav-button {
            font-size: 3rem;
            padding: 20px 25px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

    <!-- Nur NAME NAME oben links -->
    <div class="fixed top-0 left-0 z-50 p-8">
        <a href="home.html" class="text-3xl tracking-widest font-light hover:text-amber-300 transition-colors">
            NAME NAME
        </a>
    </div>

    <!-- Slideshow -->
    <div class="h-screen flex items-center justify-center p-8 relative" id="slideshow-container">
        
        <!-- Bilder kommen hier rein -->

        <!-- Linker Pfeil -->
        <button onclick="prevSlide()" 
                class="nav-button absolute left-8 text-white/70 hover:text-white transition z-10">
            ←
        </button>

        <!-- Rechter Pfeil -->
        <button onclick="nextSlide()" 
                class="nav-button absolute right-8 text-white/70 hover:text-white transition z-10">
            →
        </button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = [];

        // === HIER BILDER LADEN ===
        for (let i = 1; i <= 32; i++) {
            const img = document.createElement('img');
            img.src = `bilder/gldani/bilder/gldani-${i.toString().padStart(2, '0')}.jpg`;
            img.className = `slide w-full max-h-[92vh] object-contain mx-auto rounded`;
            img.alt = `Gldani ${i}`;
            document.getElementById('slideshow-container').appendChild(img);
            slides.push(img);
        }

        // Erstes Bild anzeigen
        if (slides.length > 0) slides[0].classList.add('active');

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            slides[n].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            showSlide(currentSlide);
        }

        // Pfeiltasten
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
    </script>

</body>
</html>
