<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Digicam — Marvin Berge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #09090b;
            overflow-x: hidden;
        }
        
        .logo-link {
            transition: color 0.3s ease;
        }
        
        .logo-link:hover {
            color: rgb(180, 83, 9);
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            padding: 140px 60px 40px 60px;
            max-width: 100%;
            margin: 0 auto;
            grid-auto-rows: auto;
        }
        
        .photo-item {
            position: relative;
            overflow: visible;
            background: transparent;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        
        .photo-item:hover {
            transform: scale(1.02);
        }
        
        .photo-item img {
            max-width: 100%;
            max-height: 240px;
            object-fit: contain;
            display: block;
        }
        
        /* Lightbox Styles */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-overlay.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .lightbox-image-container {
            position: relative;
            max-width: 45vw;
            max-height: 50vh;
            animation: zoomIn 0.3s ease;
            margin: 0 auto;
        }
        
        .lightbox-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .lightbox-close {
            display: none;
        }
        
        .lightbox-nav {
            display: none;
        }
        
        /* Responsive Grid */
        @media (max-width: 1200px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
                padding: 80px 40px 40px 40px;
            }
        }
        
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 8px;
                padding: 80px 20px 40px 20px;
            }
            
            .logo-link {
                font-size: 28px;
            }
            
            .lightbox-image-container {
                max-width: 95vw;
                max-height: 80vh;
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Header with Logo -->
    <div class="fixed top-0 left-0 w-full z-50 p-8 pointer-events-none">
        <a href="home.html" class="logo-link text-3xl md:text-4xl tracking-widest font-light pointer-events-auto inline-block">
            Marvin Berge
        </a>
    </div>

    <!-- Photo Grid Container -->
    <div class="photo-grid" id="photoGrid"></div>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightboxOverlay">
        <div class="lightbox-image-container">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <img id="lightboxImage" src="" alt="Enlarged photo">
            <div class="lightbox-nav">
                <button id="lightboxPrev">❮</button>
                <button id="lightboxNext">❯</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const IMAGES_FOLDER = 'digicam reduziert';
        const TOTAL_IMAGES = 238;
        let currentLightboxIndex = 0;
        let shuffledImages = [];

        // Generate image array
        function generateImageArray() {
            const images = [];
            for (let i = 1; i <= TOTAL_IMAGES; i++) {
                images.push({
                    name: `dailydigicamwebsite (${i}).jpg`,
                    path: `${IMAGES_FOLDER}/dailydigicamwebsite (${i}).jpg`,
                    index: i - 1
                });
            }
            return images;
        }

        // Fisher-Yates shuffle algorithm
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Create photo grid
        function createPhotoGrid() {
            const images = generateImageArray();
            shuffledImages = shuffleArray(images);
            const grid = document.getElementById('photoGrid');
            
            shuffledImages.forEach((image, displayIndex) => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.style.cursor = 'pointer';
                
                const img = document.createElement('img');
                img.src = image.path;
                img.alt = `Photo ${image.index + 1}`;
                img.loading = 'lazy';
                
                item.appendChild(img);
                
                // Add click handler
                item.addEventListener('click', () => {
                    openLightbox(displayIndex);
                });
                
                grid.appendChild(item);
            });
        }

        // Lightbox functions
        function openLightbox(index) {
            currentLightboxIndex = index;
            const lightboxOverlay = document.getElementById('lightboxOverlay');
            const lightboxImage = document.getElementById('lightboxImage');
            
            lightboxImage.src = shuffledImages[index].path;
            lightboxOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightboxOverlay = document.getElementById('lightboxOverlay');
            lightboxOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showNextImage() {
            currentLightboxIndex = (currentLightboxIndex + 1) % shuffledImages.length;
            const lightboxImage = document.getElementById('lightboxImage');
            lightboxImage.src = shuffledImages[currentLightboxIndex].path;
        }

        function showPrevImage() {
            currentLightboxIndex = (currentLightboxIndex - 1 + shuffledImages.length) % shuffledImages.length;
            const lightboxImage = document.getElementById('lightboxImage');
            lightboxImage.src = shuffledImages[currentLightboxIndex].path;
        }

        // Event listeners
        document.getElementById('lightboxOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightboxOverlay')) {
                closeLightbox();
            }
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightboxOverlay').classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
        });

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', createPhotoGrid);
    </script>
</body>
</html>
