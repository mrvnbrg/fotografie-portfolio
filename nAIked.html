<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nAIked — Marvin Berge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #f0c8d4;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 40;
            padding: 2rem;
        }
        
        .header a {
            font-size: 1.875rem;
            letter-spacing: 0.1em;
            font-weight: 300;
            color: #000;
            transition: color 0.3s ease;
        }
        
        .header a:hover {
            color: #d4666f;
        }
        
        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .content {
            display: flex;
            align-items: center;
            gap: 3.5rem;
        }
        
        .coming-soon {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #333;
        }
        
        .home-button {
            font-size: 4rem;
            cursor: pointer;
            color: #333;
            opacity: 0.7;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .home-button:hover {
            opacity: 1;
            color: #d4666f;
        }
    </style>
</head>
<body>

    <!-- Fixed Header -->
    <div class="header">
        <a href="home.html" class="tracking-widest">Marvin Berge</a>
    </div>

    <div class="container">
        <div class="content">
            <p class="coming-soon">coming soon...</p>
            <a href="home.html" class="home-button" title="Zur Startseite">
                🏠
            </a>
        </div>
    </div>

</body>
</html>
